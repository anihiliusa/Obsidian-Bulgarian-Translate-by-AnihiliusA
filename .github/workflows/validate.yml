name: Generate and validate Bulgarian translation

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Check source files
        run: |
          if [ ! -f legacy/bg.raw.txt ] || [ ! -f legacy/mapping.txt ]; then
            echo "legacy/bg.raw.txt and legacy/mapping.txt are not committed yet. Skipping generation."
            exit 0
          fi
      - name: Generate official bg.txt
        if: hashFiles('legacy/bg.raw.txt', 'legacy/mapping.txt') != ''
        run: |
          python tools/convert_flat_to_obsidian_translation.py \
            --flat legacy/bg.raw.txt \
            --mapping legacy/mapping.txt \
            --output translations/bg.txt
      - name: Validate generated translation
        if: hashFiles('translations/bg.txt') != ''
        run: |
          python tools/validate_translation.py translations/bg.txt
